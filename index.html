<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgePlay - Documentos Legais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0D0D12 0%, #14141C 100%);
            color: #F2EFE9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .logo { font-size: 36px; font-weight: 900; margin-bottom: 10px; }
        .logo span { color: #FF6B35; }
        .subtitle { color: #A8A39E; font-size: 14px; margin-bottom: 40px; }
        .cards { display: grid; gap: 16px; }
        .card {
            background: #1C1C27; border: 1px solid #262633; border-radius: 16px;
            padding: 30px 25px; text-decoration: none; display: block;
            transition: all 0.3s ease; text-align: left;
        }
        .card:hover { border-color: #FF6B35; transform: translateY(-2px); }
        .card-icon { font-size: 28px; margin-bottom: 12px; }
        .card h2 { color: #FF6B35; font-size: 18px; margin-bottom: 6px; }
        .card p { color: #A8A39E; font-size: 13px; line-height: 1.5; }
        .footer { color: #625E58; font-size: 11px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Forge<span>Play</span></div>
        <p class="subtitle">Documentos Legais e Políticas</p>
        
        <div class="cards">
            <a href="privacy.html" class="card">
                <div class="card-icon">🔒</div>
                <h2>Política de Privacidade</h2>
                <p>Como coletamos, usamos e protegemos seus dados no ForgePlay.</p>
            </a>
            
            <a href="terms.html" class="card">
                <div class="card-icon">📜</div>
                <h2>Termos de Uso</h2>
                <p>Regras e condições para uso do aplicativo ForgePlay.</p>
            </a>
        </div>
        
        <p class="footer">© 2026 NativeForge — ForgePlay. Todos os direitos reservados.</p>
    </div>
</body>
</html>
